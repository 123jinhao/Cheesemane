<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cheesemane</title>
<link rel="icon" type="image/png" href="1765926678041.png">
<style>
    /* --- BODY & BACKGROUND --- */
    html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        font-family: "Trebuchet MS", sans-serif;
        overflow: hidden; /* hide main scrollbar */
    }
    body {
        background-image: url("poltigo.png");
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;
        color: white;
        text-align: center;
        display: flex;
        justify-content: flex-start;
        flex-direction: column;
    }

    .main-container {
        width: 100%;
        max-width: 1200px;
        margin: 0 auto;
        padding: 20px;
    }

    /* --- LOGO --- */
    .logo {
        width: 380px;
        margin: 20px auto;
        display: block;
        z-index: 2;
        position: relative;
    }

    /* --- DESCRIPTION --- */
    .description {
        max-width: 600px;
        font-size: 18px;
        line-height: 1.5;
        margin: 20px auto 10px auto;
        background: rgba(0,0,0,0.45);
        padding: 12px 18px;
        border-radius: 12px;
        z-index: 2;
        position: relative;
    }
    #games-panel:active {
        cursor: grabbing;
    }

    .games-row {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 10px;
    }

    .game-button {
        width: 180px;
        padding: 10px;
        border: none;
        border-radius: 18px;
        cursor: pointer;
        font-family: "Trebuchet MS", sans-serif;
        font-weight: bold;
        font-size: 20px;
        background: white;
        color: #FFD700;
        display: flex;
        flex-direction: column;
        align-items: center;
        transition: 0.2s;
    }

    .game-button img {
        width: 120px;
        height: auto;
        margin-bottom: 15px;
    }

    .game-button:hover {
        transform: scale(1.08);
        background: #FFFF66;
    }
</style>
</head>

<body>

<div class="main-container">
    <img src="1765926678041.png" alt="Cheesemane" class="logo">
    <p class="description">
        Holes are games, mice are players.<br>
        Dig through holes, play exciting games.
    </p>
</div>

<div id="games-panel">
    <div class="games-row">
        <button class="game-button" onclick="location.href='luckyclicker.html'">
            <img src="logolucky.jpg" alt="Lucky Clicker">
            Lucky Clicker
        </button>

        <button class="game-button" onclick="location.href='fishing.html'">
            <img src="fishing.jpg" alt="Fishing Game">
            Fishing Game
        </button>

        <button class="game-button" onclick="location.href='brainrot.html'">
            <img src="brainrot.png" alt="Brainrot Battle">
            Brainrot Battle
        </button>

        <button class="game-button" onclick="location.href='crafting.html'">
            <img src="444.png" alt="Crafting Empire">
            Crafting Empire
        </button>

        <button class="game-button" onclick="location.href='dungeon.html'">
            <img src="dungeon.png" alt="Story Dungeon">
            Once upon a time…
        </button>

        <button class="game-button" onclick="location.href='MainPage.html'">
            <img src="candy.jpg" alt="Craft A Pizza">
            Craft A Pizza
        </button>

        <button class="game-button" onclick="location.href='bro.html'">
            <img src="THEBRO'S.jpg" alt="The Bros: Level 100 Legends">
            The Bros: Level 100 Legends
        </button>
    </div>
</div>



</body>
</html>
