<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lucky Clicker</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #0a0a0a;
            font-family: 'Courier New', Courier, monospace;
            color: white;
        }

        .warning-box {
            width: 400px;
            padding: 40px;
            border: 2px solid #ffffff;
            text-align: center;
            background-color: #1a1a1a;
        }

        .warning-icon {
            font-size: 2rem;
            margin-bottom: 10px;
        }

        h2 {
            margin-top: 0;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        p {
            font-size: 1.2rem;
            margin: 30px 0;
        }

        .ok-button {
            padding: 10px 40px;
            background-color: transparent;
            border: 2px solid #ffffff;
            color: white;
            text-transform: uppercase;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .ok-button:hover {
            background-color: white;
            color: black;
        }

        .instruction {
            margin-top: 20px;
            font-size: 0.8rem;
            color: #888;
        }
    </style>
</head>

<body>

    <div class="warning-box">
        <div class="warning-icon">⚠️</div>
        <h2>Warning</h2>

        <p>This game is<br>auto clicker proof</p>

        <button class="ok-button" onclick="goToGame()">OK</button>

        <div class="instruction">press ok to continue</div>
    </div>

    <script>
        function goToGame() {
            window.location.href = "luckyclicker3.html"; 
            // 👆 CHANGE THIS to your real game file name
        }
    </script>

</body>
</html>
