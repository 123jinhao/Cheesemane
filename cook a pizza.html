<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cook A Pizza!</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4e1d2;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 20px;
        }
        h1 { color: #d35400; text-shadow: 2px 2px #fff; }
        #game-container {
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 90%;
            max-width: 800px;
            text-align: center;
        }
        .shelf {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            margin: 20px 0;
            padding: 15px;
            border: 2px dashed #bdc3c7;
            border-radius: 10px;
        }
        .ingredient {
            background: #ecf0f1;
            padding: 8px 12px;
            border-radius: 20px;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
            border: 1px solid #ddd;
            font-size: 14px;
        }
        .ingredient:hover {
            transform: scale(1.1);
            background: #ffeaa7;
        }
        .rare {
            border: 2px solid #9b59b6;
            color: #8e44ad;
            font-weight: bold;
        }
        #pizza-pan {
            width: 200px;
            height: 200px;
            background: #f39c12;
            border-radius: 50%;
            margin: 20px auto;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 8px solid #e67e22;
            position: relative;
            overflow: hidden;
        }
        #topping-list {
            font-size: 12px;
            color: #fff;
            padding: 10px;
        }
        button {
            background: #27ae60;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 5px;
            font-size: 18px;
            cursor: pointer;
            margin-top: 20px;
        }
        button:hover { background: #2ecc71; }
        #status-box {
            margin-top: 20px;
            font-style: italic;
            color: #7f8c8d;
            min-height: 40px;
        }
        .section-title { font-weight: bold; margin-top: 10px; color: #2c3e50; }
    </style>
</head>
<body>

    <h1>🍕 COOK A PIZZA!</h1>
    
    <div id="game-container">
        <div id="status-box">Welcome, Chef! First, click ingredients to make your dough (Flour, Water, Salt)...</div>

        <div id="pizza-pan">
            <div id="topping-list">Empty Pan</div>
        </div>

        <div class="section-title">Common Ingredients</div>
        <div class="shelf" id="common-shelf"></div>

        <div class="section-title">Special & Rare Ingredients</div>
        <div class="shelf" id="rare-shelf"></div>

        <button onclick="bakePizza()">FIRE THE OVEN!</button>
        <button onclick="resetGame()" style="background:#c0392b">Reset Kitchen</button>
    </div>

    <script>
        const commons = ["flour", "water", "milk", "egg", "knife", "chili", "dough", "cheese", "tomato", "potato", "sliced mushroom", "spring onion", "apple", "pepper", "salt", "sugar", "fire", "pepperoni", "cherry", "oil", "pinecone", "pineapple"];
        
        const rares = ["a bar of chocolate", "cream", "carrot", "cabbage", "pumpkin", "onion", "corn", "unknown fish", "tuna", "salmon", "almond", "peanut", "grape", "grate", "honey", "cactus", "sesame seed", "seaweed", "kimchi(spicy)", "mustard", "oat", "cocoa powder", "sour powder", "aijinomoto", "lime", "chicken(raw)", "banana", "strawberry", "butter", "maple syrup", "acorn", "orange", "kimchi(spiceless)", "mayonese"];

        let currentToppings = [];
        const statusBox = document.getElementById('status-box');
        const toppingDisplay = document.getElementById('topping-list');

        function init() {
            const commonShelf = document.getElementById('common-shelf');
            const rareShelf = document.getElementById('rare-shelf');

            commons.forEach(item => {
                let div = document.createElement('div');
                div.className = 'ingredient';
                div.innerText = item;
                div.onclick = () => addIngredient(item);
                commonShelf.appendChild(div);
            });

            rares.forEach(item => {
                let div = document.createElement('div');
                div.className = 'ingredient rare';
                div.innerText = item;
                div.onclick = () => addIngredient(item);
                rareShelf.appendChild(div);
            });
        }

        function addIngredient(name) {
            if (currentToppings.length >= 12) {
                statusBox.innerText = "The pizza is getting too heavy!";
                return;
            }
            currentToppings.push(name);
            updatePizzaDisplay();
            statusBox.innerText = "Added " + name + " to the pizza!";
        }

        function updatePizzaDisplay() {
            if (currentToppings.length === 0) {
                toppingDisplay.innerText = "Empty Pan";
            } else {
                toppingDisplay.innerText = currentToppings.join(", ");
            }
        }

        function bakePizza() {
            if (currentToppings.length === 0) {
                statusBox.innerText = "You can't bake an empty pan, Chef!";
                return;
            }

            let score = 0;
            let feedback = "";

            // Logic Check
            if (currentToppings.includes("fire")) {
                if (currentToppings.includes("pinecone") || currentToppings.includes("cactus")) {
                    feedback = "It's... crunchy. The pinecone adds a woody aftertaste. 4/10";
                } else if (currentToppings.includes("aijinomoto")) {
                    feedback = "The Aijinomoto makes this the best pizza ever! 10/10!";
                } else if (currentToppings.includes("a bar of chocolate") && currentToppings.includes("unknown fish")) {
                    feedback = "Chocolate fish pizza? You are banned from the kitchen! 0/10";
                } else {
                    feedback = "Smells delicious! A solid pizza craft. 8/10";
                }
            } else {
                feedback = "It's raw! You forgot to add 'fire' to the pizza!";
            }

            alert("PIZZA RESULTS:\n" + currentToppings.join(" + ") + "\n\n" + feedback);
        }

        function resetGame() {
            currentToppings = [];
            updatePizzaDisplay();
            statusBox.innerText = "Kitchen cleaned! Start again.";
        }

        init();
    </script>
</body>
</html>
