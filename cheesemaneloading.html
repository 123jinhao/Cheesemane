<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lucky Clicker</title>
    <style>
body {
    margin: 0;
    padding: 0;

    background-image: url("poltigo.png");
    background-size: cover;          /* KEY FIX */
    background-position: center;     /* center it */
    background-repeat: no-repeat;    /* no tiling */
    background-attachment: fixed;    /* optional smooth effect */

    color: #ffffff;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;

    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;

    min-height: 100vh;   /* better than height */
}

        /* UPDATED: Much bigger title text [1] */
        .game-title {
            font-size: 6rem; /* Increased from 3rem */
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 8px;
            color: #4CAF50; 
            text-shadow: 0 0 30px rgba(76, 175, 80, 0.4);
        }

        /* UPDATED: Much bigger logo container [1] */
        .logo-container {
            width: 400px; /* Increased from 200px */
            height: 400px; /* Increased from 200px */
            margin-bottom: 60px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .clover-logo {
            width: 300%;
            height: auto;
            animation: pulse 2s infinite ease-in-out;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); } /* Slightly stronger pulse */
            100% { transform: scale(1); }
        }

        /* UPDATED: Wider loading bar area [1] */
        .loading-container {
            width: 550px; /* Increased from 400px */
            text-align: center;
        }

        /* UPDATED: Bigger loading text */
        .loading-text {
            margin-bottom: 15px;
            font-size: 2rem; /* Increased from 1.2rem */
            font-style: italic;
            color: #aaa;
        }

        .progress-bar-bg {
            width: 100%;
            height: 40px; /* Thicker bar */
            background-color: #FFBF00;
            border-radius: 20px;
            overflow: hidden;
            border: 3px solid #FFD700;
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            background-color: #FFD700;
            animation: fillBar 5s forwards linear;
        }

        @keyframes fillBar {
            0% { width: 0%; }
            100% { width: 100%; }
        }
    </style>
</head>
<body>



    <div class="logo-container">
        <!-- Using your lucky clicker.png image -->
        <img src="1765926678041.png" class="clover-logo" alt="🍀">
    </div>

    <div class="loading-container">
        <div class="loading-text">Loading Cheese...</div>
        <div class="progress-bar-bg">
            <div class="progress-fill"></div>
        </div>
    </div>

    <script>
        setTimeout(() => {
            // alert("Yay"); // Removed per previous request
            window.location.href = "cheesemane.html"; 
        }, 5500);
    </script>

</body>
</html>
